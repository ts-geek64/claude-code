name: Generate Playwright Tests

# Fires ONLY when the label "generate:tests" is added to a pull request.
# Claude writes tests to a new branch "claude-{original-branch}" and opens
# a PR targeting the original branch.

on:
  pull_request:
    types: [labeled]

jobs:
  generate-tests:
    if: github.event.label.name == 'generate:tests'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      # Use the GitHub API to list changed files — no git history needed.
      - name: Detect changed modules
        id: modules
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );

            const moduleSet = new Set();
            for (const f of files) {
              const match = f.filename.match(/^client\/src\/modules\/([^/]+)\//);
              if (match) moduleSet.add(match[1]);
            }

            const modules = [...moduleSet].join(' ');
            core.setOutput('modules', modules);
            core.info(`Detected modules: ${modules || '(none)'}`);

      - name: Create claude branch
        if: steps.modules.outputs.modules != ''
        id: branch
        run: |
          ORIGINAL="${{ github.event.pull_request.head.ref }}"
          CLAUDE_BRANCH="claude-${ORIGINAL}"
          echo "claude_branch=$CLAUDE_BRANCH" >> $GITHUB_OUTPUT

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin "$CLAUDE_BRANCH" > /dev/null 2>&1; then
            echo "Branch $CLAUDE_BRANCH already exists — reusing"
          else
            git checkout -b "$CLAUDE_BRANCH"
            git push origin "$CLAUDE_BRANCH"
          fi

      - name: Generate tests with Claude
        if: steps.modules.outputs.modules != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 5 --model claude-haiku-4-5"
          prompt: |
            Write Playwright tests for these modules: ${{ steps.modules.outputs.modules }}

            IMPORTANT: Commit all files to branch "${{ steps.branch.outputs.claude_branch }}".
            Do NOT commit to "${{ github.event.pull_request.head.ref }}".

            For each module <name>:
            1. Read: `client/src/modules/<name>/index.ts`, `client/src/modules/<name>/types/index.ts`, and the component/hook files listed in index.ts.
            2. Write `client/src/modules/<name>/tests/<name>.spec.ts` covering:
               - Page renders key elements
               - Validation errors on bad input
               - Happy path (mock API with `page.route()`)
               - API error (mock 4xx, verify error shown)
               - Loading state (button disabled during request)
            3. Switch to the claude branch, commit, and push:
               git checkout ${{ steps.branch.outputs.claude_branch }}
               git add .
               git commit -m "test(<name>): generate Playwright spec"
               git push origin ${{ steps.branch.outputs.claude_branch }}

            Rules:
            - `@playwright/test` only. No other libraries.
            - Selectors: `getByRole()` or `getByLabel()` only — never CSS selectors.
            - Mock every API call with `page.route()` — no real network requests.
            - Keep each test under 20 lines. No duplicate assertions.

      - name: Open PR and link to original
        if: steps.modules.outputs.modules != ''
        uses: actions/github-script@v7
        with:
          script: |
            const originalBranch = '${{ github.event.pull_request.head.ref }}';
            const claudeBranch   = '${{ steps.branch.outputs.claude_branch }}';
            const originalPrNum  = context.payload.pull_request.number;
            const originalPrUrl  = context.payload.pull_request.html_url;

            const modules  = '${{ steps.modules.outputs.modules }}'.trim().split(' ').filter(Boolean);
            const fileList = modules.map(m => `- \`client/src/modules/${m}/tests/${m}.spec.ts\``).join('\n');

            // Check if a PR already exists for this claude branch
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${claudeBranch}`,
              base:  originalBranch,
              state: 'open',
            });

            let newPrUrl;
            if (existing.data.length > 0) {
              newPrUrl = existing.data[0].html_url;
            } else {
              try {
                const newPr = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title: `test: Playwright specs for #${originalPrNum}`,
                  head:  claudeBranch,
                  base:  originalBranch,
                  body: [
                    `## Generated Playwright Tests`,
                    ``,
                    `Auto-generated by Claude for PR #${originalPrNum} — ${originalPrUrl}`,
                    ``,
                    `**Files added:**`,
                    fileList,
                    ``,
                    `Merge this into \`${originalBranch}\` before merging the original PR.`,
                  ].join('\n'),
                });
                newPrUrl = newPr.data.html_url;
              } catch (err) {
                core.warning(`Could not create PR: ${err.message}`);
                return;
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: originalPrNum,
              body: [
                `### 🧪 Playwright tests generated`,
                ``,
                `**→ ${newPrUrl}**`,
                `Branch: \`${claudeBranch}\` → \`${originalBranch}\``,
                ``,
                fileList,
              ].join('\n'),
            });

      - name: Warn — no modules found
        if: steps.modules.outputs.modules == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ **generate:tests** — no changes found under `client/src/modules/`. Apply this label only to PRs that add or modify a module.',
            });

name: Generate Playwright Tests

# Fires ONLY when the label "generate:tests" is added to a pull request.
# Claude writes tests to a new branch "claude-{original-branch}" and opens
# a PR targeting the original branch.

on:
  pull_request:
    types: [labeled]

jobs:
  generate-tests:
    if: github.event.label.name == 'generate:tests'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Detect changed modules
        id: modules
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          MODULES=$(echo "$CHANGED" \
            | grep '^client/src/modules/' \
            | sed 's|client/src/modules/||' \
            | cut -d'/' -f1 \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Detected modules: $MODULES"

      - name: Create claude branch
        if: steps.modules.outputs.modules != ''
        id: branch
        run: |
          ORIGINAL="${{ github.event.pull_request.head.ref }}"
          CLAUDE_BRANCH="claude-${ORIGINAL}"
          echo "claude_branch=$CLAUDE_BRANCH" >> $GITHUB_OUTPUT

          # Create the claude branch from the current PR branch
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$CLAUDE_BRANCH"
          git push origin "$CLAUDE_BRANCH"

      - name: Generate tests with Claude
        if: steps.modules.outputs.modules != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 5 --model claude-haiku-4-5"
          prompt: |
            Write Playwright tests for these modules: ${{ steps.modules.outputs.modules }}

            IMPORTANT: You must commit all changes to the branch "${{ steps.branch.outputs.claude_branch }}".
            Do NOT commit to "${{ github.event.pull_request.head.ref }}".

            For each module:
            1. Read only: `client/src/modules/<name>/index.ts`, `client/src/modules/<name>/types/index.ts`, and the component/hook files listed in index.ts.
            2. Write `client/src/modules/<name>/tests/<name>.spec.ts` covering:
               - Page renders key elements
               - Validation errors on bad input
               - Happy path (mock API with `page.route()`)
               - API error (mock 4xx, check error shown)
               - Loading state (button disabled during request)
            3. Run: git checkout ${{ steps.branch.outputs.claude_branch }}
            4. Commit with message: `test(<name>): generate Playwright spec`
            5. Push to origin/${{ steps.branch.outputs.claude_branch }}

            Rules:
            - `@playwright/test` only
            - Selectors: `getByRole()` or `getByLabel()` only
            - Mock every API call — no real network
            - Keep each test under 20 lines
            - No duplicate assertions across tests

      - name: Open PR and link to original
        if: steps.modules.outputs.modules != ''
        uses: actions/github-script@v7
        with:
          script: |
            const originalBranch = '${{ github.event.pull_request.head.ref }}';
            const claudeBranch   = '${{ steps.branch.outputs.claude_branch }}';
            const originalPrNum  = context.issue.number;
            const originalPrUrl  = '${{ github.event.pull_request.html_url }}';

            // Build file list for PR body
            const modules = '${{ steps.modules.outputs.modules }}'.trim().split(' ').filter(Boolean);
            const fileList = modules.map(m =>
              `- \`client/src/modules/${m}/tests/${m}.spec.ts\``
            ).join('\n');

            // Open the new PR targeting the original branch
            let newPr;
            try {
              newPr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: `test: Playwright specs for #${originalPrNum}`,
                head:  claudeBranch,
                base:  originalBranch,
                body: [
                  `## Generated Playwright Tests`,
                  ``,
                  `Auto-generated by Claude for PR #${originalPrNum} (${originalPrUrl}).`,
                  ``,
                  `**Files added:**`,
                  fileList,
                  ``,
                  `Review and merge this PR into \`${originalBranch}\` before merging the original PR.`,
                ].join('\n'),
              });
            } catch (err) {
              // PR may already exist if label was re-applied
              core.warning(`Could not create PR: ${err.message}`);
              return;
            }

            // Comment on the original PR with a link
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: originalPrNum,
              body: [
                `### 🧪 Playwright tests generated`,
                ``,
                `A new PR has been opened with the generated test files:`,
                `**→ ${newPr.data.html_url}**`,
                ``,
                `Branch: \`${claudeBranch}\` → \`${originalBranch}\``,
                ``,
                fileList,
              ].join('\n'),
            });

      - name: Warn — no modules found
        if: steps.modules.outputs.modules == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **generate:tests** — no changes found under `client/src/modules/`. Label this PR only when it introduces or modifies a module.',
            });

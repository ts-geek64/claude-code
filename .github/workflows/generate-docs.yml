name: Generate Module Docs

# Fires ONLY when the label "generate:docs" is added to a pull request.
# Claude writes docs to a new branch "claude-{original-branch}" and opens
# a PR targeting the original branch.

on:
  pull_request:
    types: [labeled]

jobs:
  generate-docs:
    if: github.event.label.name == 'generate:docs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      # Use the GitHub API to list changed files — no git history needed.
      - name: Detect changed modules
        id: modules
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );

            const moduleSet = new Set();
            for (const f of files) {
              const match = f.filename.match(/^client\/src\/modules\/([^/]+)\//);
              if (match) moduleSet.add(match[1]);
            }

            const modules = [...moduleSet].join(' ');
            core.setOutput('modules', modules);
            core.info(`Detected modules: ${modules || '(none)'}`);

      - name: Create claude branch
        if: steps.modules.outputs.modules != ''
        id: branch
        run: |
          ORIGINAL="${{ github.event.pull_request.head.ref }}"
          CLAUDE_BRANCH="claude-${ORIGINAL}"
          echo "claude_branch=$CLAUDE_BRANCH" >> $GITHUB_OUTPUT

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin "$CLAUDE_BRANCH" > /dev/null 2>&1; then
            echo "Branch $CLAUDE_BRANCH already exists — reusing"
          else
            git checkout -b "$CLAUDE_BRANCH"
            git push origin "$CLAUDE_BRANCH"
          fi

      - name: Generate docs with Claude
        if: steps.modules.outputs.modules != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 5 --model claude-haiku-4-5"
          prompt: |
            Write module documentation for: ${{ steps.modules.outputs.modules }}

            IMPORTANT: Commit all files to branch "${{ steps.branch.outputs.claude_branch }}".
            Do NOT commit to "${{ github.event.pull_request.head.ref }}".

            For each module <name>:
            1. Read: `client/src/modules/<name>/index.ts`, `client/src/modules/<name>/types/index.ts`, component files, hook files.
            2. Write `client/src/modules/<name>/README.md` using this exact structure:

            ```
            # <Name> Module
            One sentence — what it does.

            ## Files
            | File | Purpose |
            |------|---------|

            ## API Routes
            | Method | Path | Body | Response |
            (omit section if no API routes)

            ## Components
            ### `ComponentName`
            What it renders. Usage example (5 lines max).

            ## Hooks
            ### `useHookName()`
            What it returns. Usage example (3 lines max).

            ## Types
            Code block only — types a consumer needs. No prose.

            ## Notes
            Bullet points. Non-obvious things only. Omit if nothing to add.
            ```

            3. Switch to the claude branch, commit, and push:
               git checkout ${{ steps.branch.outputs.claude_branch }}
               git add .
               git commit -m "docs(<name>): generate module README"
               git push origin ${{ steps.branch.outputs.claude_branch }}

            Rules:
            - No jargon, no filler phrases ("This component is responsible for...")
            - No duplication between prose and code examples
            - README must be under 80 lines total

      - name: Open PR and link to original
        if: steps.modules.outputs.modules != ''
        uses: actions/github-script@v7
        with:
          script: |
            const originalBranch = '${{ github.event.pull_request.head.ref }}';
            const claudeBranch   = '${{ steps.branch.outputs.claude_branch }}';
            const originalPrNum  = context.payload.pull_request.number;
            const originalPrUrl  = context.payload.pull_request.html_url;

            const modules  = '${{ steps.modules.outputs.modules }}'.trim().split(' ').filter(Boolean);
            const fileList = modules.map(m => `- \`client/src/modules/${m}/README.md\``).join('\n');

            // Reuse existing PR if tests were generated first on the same claude branch
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${claudeBranch}`,
              base:  originalBranch,
              state: 'open',
            });

            let newPrUrl;
            if (existing.data.length > 0) {
              newPrUrl = existing.data[0].html_url;
              // Append docs section to existing PR body if not already there
              const body = existing.data[0].body || '';
              if (!body.includes('README')) {
                await github.rest.pulls.update({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  pull_number: existing.data[0].number,
                  body:        body + '\n\n**Docs added:**\n' + fileList,
                });
              }
            } else {
              try {
                const newPr = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title: `docs: module README for #${originalPrNum}`,
                  head:  claudeBranch,
                  base:  originalBranch,
                  body: [
                    `## Generated Module Documentation`,
                    ``,
                    `Auto-generated by Claude for PR #${originalPrNum} — ${originalPrUrl}`,
                    ``,
                    `**Files added:**`,
                    fileList,
                    ``,
                    `Merge this into \`${originalBranch}\` before merging the original PR.`,
                  ].join('\n'),
                });
                newPrUrl = newPr.data.html_url;
              } catch (err) {
                core.warning(`Could not create PR: ${err.message}`);
                return;
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: originalPrNum,
              body: [
                `### 📄 Module documentation generated`,
                ``,
                `**→ ${newPrUrl}**`,
                `Branch: \`${claudeBranch}\` → \`${originalBranch}\``,
                ``,
                fileList,
              ].join('\n'),
            });

      - name: Warn — no modules found
        if: steps.modules.outputs.modules == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ **generate:docs** — no changes found under `client/src/modules/`. Apply this label only to PRs that add or modify a module.',
            });

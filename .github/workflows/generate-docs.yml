name: Generate Module Documentation

# Fires ONLY when the label "generate:docs" is added to a pull request.
# Claude writes docs to a new branch "claude-{original-branch}" and opens
# a PR targeting the original branch.

on:
  pull_request:
    types: [labeled]

jobs:
  generate-docs:
    if: github.event.label.name == 'generate:docs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Detect changed modules
        id: modules
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          MODULES=$(echo "$CHANGED" \
            | grep '^client/src/modules/' \
            | sed 's|client/src/modules/||' \
            | cut -d'/' -f1 \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Detected modules: $MODULES"

      - name: Create claude branch
        if: steps.modules.outputs.modules != ''
        id: branch
        run: |
          ORIGINAL="${{ github.event.pull_request.head.ref }}"
          CLAUDE_BRANCH="claude-${ORIGINAL}"
          echo "claude_branch=$CLAUDE_BRANCH" >> $GITHUB_OUTPUT

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reuse the branch if it already exists (e.g. tests were generated first)
          if git ls-remote --exit-code origin "$CLAUDE_BRANCH" > /dev/null 2>&1; then
            echo "Branch $CLAUDE_BRANCH already exists — reusing"
            git fetch origin "$CLAUDE_BRANCH"
            git checkout "$CLAUDE_BRANCH"
          else
            git checkout -b "$CLAUDE_BRANCH"
            git push origin "$CLAUDE_BRANCH"
          fi

      - name: Generate docs with Claude
        if: steps.modules.outputs.modules != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 5 --model claude-haiku-4-5"
          prompt: |
            Write module documentation for: ${{ steps.modules.outputs.modules }}

            IMPORTANT: You must commit all changes to the branch "${{ steps.branch.outputs.claude_branch }}".
            Do NOT commit to "${{ github.event.pull_request.head.ref }}".

            For each module:
            1. Read only: `client/src/modules/<name>/index.ts`, `client/src/modules/<name>/types/index.ts`, component files, hook files.
            2. Write `client/src/modules/<name>/README.md` with this structure:

            ```
            # <Name> Module
            One sentence — what it does.

            ## Files
            | File | Purpose |
            |------|---------|

            ## API Routes
            | Method | Path | Body | Response |
            (omit if none)

            ## Components
            ### `ComponentName`
            What it renders. Usage example (5 lines max).

            ## Hooks
            ### `useHookName()`
            What it returns. Usage example (3 lines max).

            ## Types
            Only types a consumer needs. Code block only, no prose.

            ## Notes
            Bullet points. Only non-obvious things. Omit if nothing to add.
            ```

            3. Run: git checkout ${{ steps.branch.outputs.claude_branch }}
            4. Commit with message: `docs(<name>): generate module README`
            5. Push to origin/${{ steps.branch.outputs.claude_branch }}

            Rules:
            - No jargon, no filler phrases
            - No duplication between prose and code examples
            - Every sentence must add new information
            - Total README must be under 80 lines

      - name: Open PR and link to original
        if: steps.modules.outputs.modules != ''
        uses: actions/github-script@v7
        with:
          script: |
            const originalBranch = '${{ github.event.pull_request.head.ref }}';
            const claudeBranch   = '${{ steps.branch.outputs.claude_branch }}';
            const originalPrNum  = context.issue.number;
            const originalPrUrl  = '${{ github.event.pull_request.html_url }}';

            const modules = '${{ steps.modules.outputs.modules }}'.trim().split(' ').filter(Boolean);
            const fileList = modules.map(m =>
              `- \`client/src/modules/${m}/README.md\``
            ).join('\n');

            // Check if a PR for this claude branch already exists
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${claudeBranch}`,
              state: 'open',
            });

            let newPrUrl;

            if (existing.data.length > 0) {
              // PR already exists (tests were generated first) — just update the body
              newPrUrl = existing.data[0].html_url;
              const existingBody = existing.data[0].body || '';
              if (!existingBody.includes('README')) {
                await github.rest.pulls.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  pull_number:  existing.data[0].number,
                  body: existingBody + '\n\n**Docs added:**\n' + fileList,
                });
              }
            } else {
              // Open a new PR
              try {
                const newPr = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title: `docs: module README for #${originalPrNum}`,
                  head:  claudeBranch,
                  base:  originalBranch,
                  body: [
                    `## Generated Module Documentation`,
                    ``,
                    `Auto-generated by Claude for PR #${originalPrNum} (${originalPrUrl}).`,
                    ``,
                    `**Files added:**`,
                    fileList,
                    ``,
                    `Review and merge this PR into \`${originalBranch}\` before merging the original PR.`,
                  ].join('\n'),
                });
                newPrUrl = newPr.data.html_url;
              } catch (err) {
                core.warning(`Could not create PR: ${err.message}`);
                return;
              }
            }

            // Comment on the original PR
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: originalPrNum,
              body: [
                `### 📄 Module documentation generated`,
                ``,
                `A new PR has been opened with the generated docs:`,
                `**→ ${newPrUrl}**`,
                ``,
                `Branch: \`${claudeBranch}\` → \`${originalBranch}\``,
                ``,
                fileList,
              ].join('\n'),
            });

      - name: Warn — no modules found
        if: steps.modules.outputs.modules == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **generate:docs** — no changes found under `client/src/modules/`. Label this PR only when it introduces or modifies a module.',
            });
